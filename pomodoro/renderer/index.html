<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Title bar for dragging -->
    <div class="title-bar">
      <span class="title-text">🍅 番茄钟</span>
      <button class="btn-close" id="closeBtn">✕</button>
    </div>

    <!-- Timer display -->
    <div class="timer-section">
      <svg class="progress-ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88" />
        <circle class="ring-fg" id="progressRing" cx="100" cy="100" r="88" />
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="phase-label" id="phaseLabel">工作中</div>
      </div>
    </div>

    <!-- Progress info -->
    <div class="pomodoro-count" id="pomodoroCount">第 0 个番茄</div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" id="startBtn">开始</button>
      <button class="btn btn-secondary" id="pauseBtn" disabled>暂停</button>
      <button class="btn btn-outline" id="resetBtn">重置</button>
    </div>

    <!-- Settings button -->
    <button class="btn-settings" id="settingsToggle">⚙</button>

    <!-- Settings panel -->
    <div class="settings-panel hidden" id="settingsPanel">
      <h3>设置</h3>
      <div class="setting-row">
        <label>工作时长 (分)</label>
        <input type="number" id="workDuration" value="25" min="1" max="60">
      </div>
      <div class="setting-row">
        <label>短休息 (分)</label>
        <input type="number" id="shortBreak" value="5" min="1" max="30">
      </div>
      <div class="setting-row">
        <label>长休息 (分)</label>
        <input type="number" id="longBreak" value="15" min="1" max="60">
      </div>
      <div class="setting-row">
        <label>长休息间隔</label>
        <input type="number" id="longBreakInterval" value="4" min="2" max="10">
      </div>
      <button class="btn btn-primary" id="settingsSave">保存</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
